<?xml version="1.0" encoding="UTF-8"?>
<svg
    xmlns="http://www.w3.org/2000/svg"
    viewBox="0 0 512 512"
    width="512"
    height="512">

  <!-- Rounded square background -->
  <rect
    x="16"
    y="16"
    width="480"
    height="480"
    rx="72"
    ry="72"
    fill="#F2E6D8"/>

  <!-- Pointy Ears -->
  <path d="M110 90 L190 80 L160 200 Z"
        fill="#C97A3D"
        stroke="#5A2E12"
        stroke-width="8"/>

  <path d="M402 90 L322 80 L352 200 Z"
        fill="#C97A3D"
        stroke="#5A2E12"
        stroke-width="8"/>

  <!-- Inner Ears -->
  <path d="M135 115 L175 110 L160 185 Z" fill="#E8B18A"/>
  <path d="M377 115 L337 110 L352 185 Z" fill="#E8B18A"/>

  <!-- Triangular Head (rounded, pointing down) -->
  <path d="
    M140 210
    Q256 130 372 210
    Q400 350 256 420
    Q112 350 140 210
    Z"
    fill="#D98945"
    stroke="#5A2E12"
    stroke-width="10"/>

  <!-- Eyes -->
  <ellipse cx="210" cy="260" rx="22" ry="30" fill="#FFFFFF"/>
  <ellipse cx="302" cy="258" rx="22" ry="30" fill="#FFFFFF"/>

  <!-- Pupils (mischievous offset) -->
  <circle cx="218" cy="268" r="12" fill="#1A1A1A"/>
  <circle cx="294" cy="262" r="12" fill="#1A1A1A"/>

  <!-- Eyebrows -->
  <path d="M180 220 Q215 200 240 210"
        fill="none"
        stroke="#4A240E"
        stroke-width="8"
        stroke-linecap="round"/>

  <path d="M330 220 Q295 205 270 210"
        fill="none"
        stroke="#4A240E"
        stroke-width="8"
        stroke-linecap="round"/>

  <!-- Nose -->
  <ellipse cx="256" cy="305" rx="16" ry="12" fill="#3B1E0E"/>

  <!-- Mouth -->
  <path d="M220 330 Q256 350 292 330"
        fill="none"
        stroke="#3B1E0E"
        stroke-width="6"
        stroke-linecap="round"/>

  <!-- Bright Blue Teeth -->
  <rect x="238" y="332" width="18" height="28" rx="4" fill="#3FA9F5"/>
  <rect x="256" y="332" width="18" height="28" rx="4" fill="#3FA9F5"/>

  <!-- Teeth Outline -->
  <rect x="238" y="332" width="36" height="28" rx="4"
        fill="none"
        stroke="#1C5D99"
        stroke-width="3"/>

  <!-- Cheeks -->
  <ellipse cx="190" cy="320" rx="22" ry="16" fill="#E8B18A" opacity="0.6"/>
  <ellipse cx="322" cy="320" rx="22" ry="16" fill="#E8B18A" opacity="0.6"/>

</svg>
